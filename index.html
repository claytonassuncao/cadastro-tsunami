<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campori DSA 2027</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="container py-4 py-lg-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-9">
                <div class="card hero-card border-0 overflow-hidden">
                    <div class="card-body p-4 p-lg-5">
                        <header class="text-center mb-4 mb-lg-5">
                            <div class="logo-shell mx-auto mb-4">
                                <img
                                    src="assets/logo-tsunami.png"
                                    alt="Logo Clube Tsunami"
                                    class="brand-logo img-fluid"
                                />
                            </div>
                            <span class="eyebrow badge rounded-pill text-bg-light border px-3 py-2 mb-3">
                                Campori DSA 2027
                            </span>
                            <h1 class="display-title mb-2">Cadastro Clube Tsunami</h1>
                            <p class="hero-copy mx-auto mb-0">
                                Complete os dados do participante para enviar o cadastro de forma rapida,
                                clara e organizada.
                            </p>
                        </header>

                        <section class="form-panel">
                            <div class="section-heading mb-4">
                                <h2 class="h4 mb-2">Dados do cadastro</h2>
                                <p class="text-secondary mb-0">
                                    Revise os campos obrigatorios antes de enviar.
                                </p>
                            </div>

                            <form id="customerForm" class="row g-3 g-lg-4">
                                <div class="col-md-6">
                                    <label for="name" class="form-label">Nome</label>
                                    <input id="name" name="name" type="text" class="form-control form-control-lg" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="cpfCnpj" class="form-label">CPF</label>
                                    <input id="cpfCnpj" name="cpfCnpj" type="text" inputmode="numeric" class="form-control form-control-lg" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label">E-Mail</label>
                                    <input id="email" name="email" type="email" class="form-control form-control-lg" required>
                                </div>

                                <div class="col-md-3">
                                    <label for="phone" class="form-label">Telefone</label>
                                    <input id="phone" name="phone" type="text" inputmode="numeric" class="form-control form-control-lg">
                                </div>

                                <div class="col-md-3">
                                    <label for="mobilePhone" class="form-label">Celular</label>
                                    <input id="mobilePhone" name="mobilePhone" type="text" inputmode="numeric" class="form-control form-control-lg" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="address" class="form-label">Endereco</label>
                                    <input id="address" name="address" type="text" class="form-control form-control-lg">
                                </div>

                                <div class="col-md-2">
                                    <label for="addressNumber" class="form-label">Numero</label>
                                    <input id="addressNumber" name="addressNumber" type="number" class="form-control form-control-lg">
                                </div>

                                <div class="col-md-4">
                                    <label for="complement" class="form-label">Complemento</label>
                                    <input id="complement" name="complement" type="text" class="form-control form-control-lg">
                                </div>

                                <div class="col-md-4">
                                    <label for="province" class="form-label">Bairro</label>
                                    <input id="province" name="province" type="text" class="form-control form-control-lg">
                                </div>

                                <div class="col-md-4">
                                    <label for="postalCode" class="form-label">CEP</label>
                                    <input id="postalCode" name="postalCode" type="text" class="form-control form-control-lg">
                                </div>

                                <div class="col-12">
                                    <label for="observations" class="form-label">Nome Completo do Desbravador</label>
                                    <input id="observations" name="observations" class="form-control form-control-lg" />
                                </div>

                                <div class="col-12">
                                    <div class="action-row d-flex flex-column flex-md-row gap-3 mt-2 pt-2">
                                        <button type="submit" class="btn btn-primary btn-lg px-4">Enviar Cadastro</button>
                                        <button type="reset" class="btn btn-outline-secondary btn-lg px-4">Limpar</button>
                                    </div>
                                </div>
                            </form>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
